mission_server:
  ros__parameters:
    waypoints:
      - "0.0,0.0,1.5"
      - "1.5,0.0,1.5"
      - "1.5,1.2,1.5"
      - "0.0,1.2,1.5"
      - "0.0,0.0,1.5"
    switch_distance: 0.35
    publish_rate_hz: 5.0

px4_uav_leader:
  ros__parameters:
    command_rate_hz: 20.0
    arm_after_setpoints: 20
    target_system: 1
    target_component: 1
    source_system: 1
    source_component: 1
    auto_land_when_finished: false

ugv_state_publisher:
  ros__parameters:
    update_rate_hz: 30.0
    initial_x: -0.4
    initial_y: -0.4
    initial_yaw: 0.0

ugv_follower_controller:
  ros__parameters:
    control_rate_hz: 20.0
    kv: 0.45
    kw: 1.4
    max_speed: 0.5
    max_yaw_rate: 1.2
    stop_distance: 0.25

gazebo_obstacle_detector:
  ros__parameters:
    obstacles:
      - "0.75,0.25,0.20"
      - "0.85,0.95,0.20"
    detection_range: 0.45
    lateral_width: 0.28
    publish_rate_hz: 10.0

grid_obstacle_planner:
  ros__parameters:
    width: 60
    height: 40
    resolution: 0.1
    origin_x: -3.0
    origin_y: -2.0
    inflation_radius_cells: 2
    local_goal_lookahead_cells: 5
    publish_rate_hz: 10.0

trajectory_logger:
  ros__parameters:
    output_path: "/home/robbinpanda/GKCII/uav_ugv_ros2_ws/results/run_001.csv"
    sample_rate_hz: 10.0
